<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jassy.ai | المستقبل الآمن للذكاء الاصطناعي</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ME8WW94276"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ME8WW94276');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --matrix-color: #00FF41;
            --bg-dark: #050505;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        .tech-font { font-family: 'JetBrains Mono', monospace; }
        
        /* تحسين خلفية الأنيميشن لضمان عدم حدوث شاشة سوداء */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.1;
            pointer-events: none;
        }

        /* حاوية المحتوى الأساسية */
        .main-content {
            position: relative;
            z-index: 10;
        }

        .glow-green {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid var(--matrix-color);
        }

        .btn-primary {
            background: var(--matrix-color);
            color: black;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s ease;
            display: inline-block;
        }
        .btn-primary:hover {
            box-shadow: 0 0 30px var(--matrix-color);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="main-content">
        <nav class="p-6 border-b border-white/5 bg-black/50 backdrop-blur-lg">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="text-2xl font-black tech-font tracking-tighter">
                    JASSY<span style="color: var(--matrix-color);">.AI</span>
                </div>
                <div class="hidden md:flex gap-6 text-sm opacity-70">
                    <a href="#" class="hover:text-[#00FF41]">الرئيسية</a>
                    <a href="#" class="hover:text-[#00FF41]">الخصوصية</a>
                    <a href="#" class="hover:text-[#00FF41]">اتصل بنا</a>
                </div>
            </div>
        </nav>

        <main class="flex flex-col items-center justify-center min-height-[80vh] py-20 px-6 text-center">
            <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">
                ذكاء اصطناعي <br> 
                <span style="color: var(--matrix-color);">بخصوصية مغربية</span>
            </h1>
            <p class="max-w-2xl text-gray-400 text-lg md:text-xl mb-10">
                أول منصة مغربية تمنحك قوة الـ AI مع ضمان مجهولية هويتك بالكامل. لا تتبع، لا تخزين بيانات، فقط إبداع.
            </p>
            
            <div class="flex flex-wrap justify-center gap-4">
                <a href="#" class="btn-primary">ابدأ الدردشة الآن</a>
                <a href="#" class="border border-white/20 px-8 py-3 rounded hover:bg-white/5 transition">اكتشف المزيد</a>
            </div>
        </main>

        <footer class="mt-20 py-10 border-t border-white/5 text-center">
            <p class="text-xs text-gray-600 tech-font uppercase tracking-widest">
                © 2026 Jassy.ai | Built in Tangier, Morocco
            </p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "0101010101010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, index) => {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, index * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[index] = 0;
                }
                drops[index]++;
            });
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
