<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="meta-title">Jassy.ai | أول ذكاء اصطناعي مغربي خاص وآمن بالكامل</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ME8WW94276"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ME8WW94276');
    </script>

    <meta name="description" content="اكتشف Jassy.ai، المنصة المغربية الرائدة للذكاء الاصطناعي التي تحترم خصوصيتك.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Cairo', sans-serif; background-color: #020202; color: #d1d5db; margin: 0; overflow-x: hidden; }
        .matrix-green { color: #00FF41; }
        .tech-font { font-family: 'JetBrains Mono', monospace; }
        .glow-text { text-shadow: 0 0 20px rgba(0, 255, 65, 0.5); }
        .cyber-border { border: 1px solid rgba(0, 255, 65, 0.2); transition: 0.3s; }
        .btn-glow { background: #333; color: #888; padding: 1rem 2.5rem; font-weight: 800; border-radius: 4px; cursor: not-allowed; display: inline-block; border: 1px solid #444; }
        
        section { min-height: 100vh; padding: 120px 0; position: relative; z-index: 10; }
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.12; pointer-events: none; }
        
        .lang-btn { cursor: pointer; padding: 5px 10px; border: 1px solid transparent; transition: 0.3s; font-size: 0.75rem; }
        .lang-btn:hover, .lang-btn.active { border-color: #00FF41; color: #00FF41; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-blur: 5px; }
        .modal-content { background-color: #0a0a0a; margin: 5% auto; padding: 40px; border: 1px solid #00FF41; width: 80% }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <nav class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-md border-b border-[#00FF41]/20">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="tech-font font-bold text-2xl text-white">JASSY<span class="matrix-green">.AI</span></div>
            
            <div class="flex items-center gap-4">
                <div class="flex gap-2 tech-font text-[10px] border-l border-white/10 pl-4">
                    <span class="lang-btn active" onclick="changeLang('ar')">AR</span>
                    <span class="lang-btn" onclick="changeLang('darija')">DAR</span>
                    <span class="lang-btn" onclick="changeLang('fr')">FR</span>
                    <span class="lang-btn" onclick="changeLang('en')">EN</span>
                    <span class="lang-btn" onclick="changeLang('es')">ES</span>
                </div>
                <a href="mailto:jassirboutefah@gmail.com" class="text-[10px] matrix-green border border-[#00FF41] px-3 py-1 rounded">CONTACT</a>
            </div>
        </div>
    </nav>

    <section id="home" class="flex items-center justify-center text-center px-6">
        <div class="max-w-4xl">
            <h1 id="hero-title" class="text-6xl md:text-8xl font-black text-white mb-8 glow-text leading-none uppercase">
                خصوصيتك <br> <span class="matrix-green">هي قوتنا</span>
            </h1>
            <p id="hero-desc" class="text-xl md:text-2xl text-gray-400 mb-12 max-w-2xl mx-auto">
                استخدم الذكاء الاصطناعي الأقوى عالمياً بهوية مغربية مجهولة تماماً. لا تتبع، لا تسجيل، فقط خصوصية مطلقة.
            </p>
            <div class="flex flex-col items-center gap-6">
                <div class="relative group">
                    <span class="btn-glow tech-font text-lg uppercase tracking-widest" id="btn-text">
                        Coming Soon | قريباً
                    </span>
                    <p class="text-[10px] mt-2 matrix-green animate-pulse tech-font">SERVER UPGRADE IN PROGRESS</p>
                </div>
                
                <p class="tech-font text-sm text-gray-500 bg-black/40 px-4 py-2 rounded-full border border-white/5">
                    <span id="visitor-count" class="matrix-green font-bold">1,248</span> <span id="user-status">مستخدم مجهول متصل الآن</span>
                </p>
            </div>
        </div>
    </section>

    <script>
        // نظام ترجمة اللغات
        const translations = {
            ar: {
                heroTitle: "خصوصيتك <br> <span class='matrix-green'>هي قوتنا</span>",
                heroDesc: "استخدم الذكاء الاصطناعي الأقوى عالمياً بهوية مغربية مجهولة تماماً. لا تتبع، لا تسجيل، فقط خصوصية مطلقة.",
                btn: "Coming Soon | قريباً",
                status: "مستخدم مجهول متصل الآن",
                dir: "rtl"
            },
            darija: {
                heroTitle: "الخصوصية ديالك <br> <span class='matrix-green'>هي الساروت</span>",
                heroDesc: "خدم بأجهد ذكاء اصطناعي فالعالم بهوية مغربية مخبية 100%. بلا تتبع، بلا تسجيل، غير الخصوصية ديالك.",
                btn: "قريب بزاف.. تسناو شوية",
                status: "واحد دابا خدام معانا متخفي",
                dir: "rtl"
            },
            fr: {
                heroTitle: "VOTRE VIE PRIVÉE <br> <span class='matrix-green'>NOTRE FORCE</span>",
                heroDesc: "Utilisez l'IA la plus puissante au monde avec une identité marocaine totalement anonyme. Pas de tracking, juste la vie privée.",
                btn: "Bientôt disponible",
                status: "utilisateurs anonymes en ligne",
                dir: "ltr"
            },
            en: {
                heroTitle: "YOUR PRIVACY <br> <span class='matrix-green'>IS OUR POWER</span>",
                heroDesc: "Use the world's most powerful AI with a fully anonymous Moroccan identity. No tracking, no registration.",
                btn: "Coming Soon",
                status: "anonymous users online",
                dir: "ltr"
            },
            es: {
                heroTitle: "TU PRIVACIDAD <br> <span class='matrix-green'>NUESTRO PODER</span>",
                heroDesc: "Utilice la IA más potente del mundo con una identidad marroquí totalmente anónima. Sin seguimiento.",
                btn: "Próximamente",
                status: "usuarios anónimos en línea",
                dir: "ltr"
            }
        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('hero-title').innerHTML = t.heroTitle;
            document.getElementById('hero-desc').innerText = t.heroDesc;
            document.getElementById('btn-text').innerText = t.btn;
            document.getElementById('user-status').innerText = t.status;
            document.body.dir = t.dir;
            
            // تحديث حالة الأزرار
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Matrix Animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        const alphabet = '01';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00FF41';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
